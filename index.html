<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>夕暮れメダル</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- タイトル -->
  <section id="titleScreen" class="screen active">

    <div class="titleVisual">
      <img src="title.png" alt="夕暮れメダル">
    </div>

    <div class="titleText">

      <h1>夕暮れメダル</h1>

      <p>
        誰もいないゲームコーナーで、<br>
        今日もメダルを落とす。
      </p>

      <button id="startBtn" class="mainBtn">
        タップしてスタート
      </button>

    </div>

  </section>

  <!-- ゲーム -->
  <section id="gameScreen" class="screen">

    <div class="hud">

      <div>
        GET <span id="scoreEl">0</span>
      </div>

      <div>
        残り <span id="timeEl">60</span>秒
      </div>

    </div>

    <button id="backBtn" class="backBtn">
      タイトルへ
    </button>

    <canvas
      id="gameCanvas"
      width="360"
      height="520"
    ></canvas>

    <div id="messageEl" class="message">
      …
    </div>

    <button id="dropBtn" class="mainBtn dropBtn">
      メダル投入
    </button>

  </section>

  <!-- 結果 -->
  <section id="resultScreen" class="screen">

    <div class="resultBox">

      <h2 id="rankEl">
        夕暮れ部員
      </h2>

      <p id="resultScoreEl">
        GET 0枚
      </p>

      <p id="resultCommentEl">
        今日もメダルを落とした。
      </p>

      <div class="resultButtons">

        <button id="shareBtn" class="mainBtn">
          Xでシェア
        </button>

        <button id="retryBtn" class="mainBtn">
          もう1回遊ぶ
        </button>

        <button id="homeBtn" class="mainBtn">
          カバゲーセンへ
        </button>

      </div>

    </div>

  </section>

</div>

<script src="game.js"></script>

</body>
</html>
